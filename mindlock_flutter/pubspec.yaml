name: mindlock
description: MindLock - Premium Digital Discipline App
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Networking
  dio: ^5.4.3
  retrofit: ^4.1.0

  # Local Database
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.22
  path_provider: ^2.1.3
  path: ^1.9.0

  # Secure Storage
  flutter_secure_storage: ^9.0.0

  # Shared Preferences
  shared_preferences: ^2.2.3

  # Local Notifications
  flutter_local_notifications: ^17.1.2

  # Firebase (placeholder - configure later)
  firebase_core: ^3.1.1
  firebase_messaging: ^15.0.4

  # Installed Apps (Android)
  device_apps: ^2.2.0

  # App Usage Stats
  app_usage: ^3.0.1

  # Permissions
  permission_handler: ^11.3.1

  # Image / Avatar
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2

  # Utils
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  intl: ^0.19.0
  uuid: ^4.4.0
  connectivity_plus: ^6.0.3
  package_info_plus: ^8.0.0
  device_info_plus: ^10.1.0
  collection: ^1.18.0
  logger: ^2.3.0
  rxdart: ^0.27.7
  fl_chart: ^0.68.0
  shimmer: ^3.0.0
  lottie: ^3.1.0
  flutter_svg: ^2.0.10+1
  url_launcher: ^6.3.0
  share_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  retrofit_generator: ^8.1.0
  drift_dev: ^2.18.0
  mocktail: ^1.0.4
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
